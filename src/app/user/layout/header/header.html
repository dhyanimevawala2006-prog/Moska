<!-- NAV with interactive profile & auth -->
<header class="main-header" [class.scrolled]="isScrolled">
    <div class="logo">MOSKA</div>
    <nav class="nav-menu">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">HOME</a>
        <a routerLink="/category" routerLinkActive="active">CATEGORY</a>
        <a routerLink="/about" routerLinkActive="active">ABOUT US</a>
        <a routerLink="/explore" routerLinkActive="active">EXPLORE</a>
        <a routerLink="/contact" routerLinkActive="active">CONTACT US</a>
    </nav>
    <div class="header-right" (click)="$event.stopPropagation()">

        <!-- Theme Toggle Button -->
        <button class="theme-toggle-btn" (click)="themeService.toggle()"
            [title]="themeService.dark ? 'Switch to Light' : 'Switch to Dark'">
            <i [class]="themeService.dark ? 'fas fa-sun' : 'fas fa-moon'"></i>
        </button>

        <!-- Profile icon (logged in only) -->
        <div class="profile-container" *ngIf="userId">
            <div class="user-icon" (click)="toggleDropdown($event)">👤</div>
            <div class="profile-dropdown" [class.show]="dropdownOpen">
                <a routerLink="/profile" (click)="closeDropdown()">My Profile</a>
                <a routerLink="/myorder" (click)="closeDropdown()">Orders</a>
                <a routerLink="/wishlist" (click)="closeDropdown()">Wishlist</a>
                <button (click)="logout()">Logout</button>
            </div>
        </div>

        <!-- Auth buttons: show only when NOT logged in -->
        <div class="auth-buttons">
            <ng-container *ngIf="!userId">
                <button class="btn-login" (click)="router.navigate(['/login'])">LOGIN</button>
                <button class="btn-register" (click)="router.navigate(['/register'])">REGISTER</button>
            </ng-container>
            <button class="btn-register" (click)="router.navigate(['/cart'])">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cart4" viewBox="0 0 16 16">
                    <path d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l.5 2H5V5zM6 5v2h2V5zm3 0v2h2V5zm3 0v2h1.36l.5-2zm1.11 3H12v2h.61zM11 8H9v2h2zM8 8H6v2h2zM5 8H3.89l.5 2H5zm0 5a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0"/>
                </svg> CART
            </button>
        </div>

    </div>
</header>
