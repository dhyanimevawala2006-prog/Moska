<!-- PRODUCT SECTION -->
<section class="store-grid reveal">
    <div class="section-intro">
        <h2>Premium Collection</h2>
        <p>Curated excellence for your daily lifestyle.</p>
        <div class="search-sort-row">
            <div class="search-bar-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="product-search" placeholder="Search products..."
                    [(ngModel)]="searchQuery" />
                <button class="search-clear" *ngIf="searchQuery" (click)="searchQuery=''">✕</button>
            </div>
            <select class="sort-select" [(ngModel)]="sortBy">
                <option value="default">Sort: Default</option>
                <option value="price-asc">Price: Low → High</option>
                <option value="price-desc">Price: High → Low</option>
                <option value="name-asc">Name: A → Z</option>
                <option value="name-desc">Name: Z → A</option>
            </select>
        </div>
    </div>

    <p class="search-result-count" *ngIf="searchQuery">
        {{ filteredProducts.length }} result{{ filteredProducts.length !== 1 ? 's' : '' }} for "{{ searchQuery }}"
    </p>

    <div class="grid-layout" *ngIf="filteredProducts.length > 0">
        <app-product-card
            *ngFor="let p of filteredProducts"
            [product]="p"
            [selectedColor]="selectedColors[p._id] || ''"
            (cardClicked)="navigateToDetails($event, p)"
            (addToCart)="addToCart($event, p)"
            (colorSelected)="selectColor($event.event, p._id, $event.color)">
        </app-product-card>
    </div>

    <div class="no-products" *ngIf="filteredProducts.length === 0 && !loading">
        <div class="empty-icon">📦</div>
        <p>No products found in this category.</p>
        <a routerLink="/category" class="btn-back">Browse Categories</a>
    </div>
</section>
