<div class="wishlist-page">

  <div class="page-header">
    <a routerLink="/profile" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <h1>My Wishlist</h1>
    <span class="count">{{ (products$ | async)?.length ?? 0 }} items</span>
  </div>

  <ng-container *ngIf="products$ | async as products">

    <div class="empty-state" *ngIf="products.length === 0">
      <i class="fas fa-heart-broken"></i>
      <p>Your wishlist is empty</p>
      <a routerLink="/" class="btn-shop">Start Shopping</a>
    </div>

    <div class="wishlist-grid" *ngIf="products.length > 0">
      <div class="wish-card" *ngFor="let p of products">
        <a [routerLink]="['/productdetails', p._id]">
          <img [src]="getProductImage(p.pic1)" [alt]="p.pname"
               (error)="onImgError($event)">
        </a>
        <div class="wish-info">
          <h4>{{ p.pname }}</h4>
          <span class="price">₹{{ p.price }}</span>
        </div>
        <button class="btn-remove" (click)="remove(p._id)">
          <i class="fas fa-heart"></i>
        </button>
      </div>
    </div>

  </ng-container>

</div>
